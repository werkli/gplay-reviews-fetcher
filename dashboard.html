<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Play Reviews Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container { max-width: 1200px; margin: 0 auto; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    
    h1 { font-size: 1.8rem; color: #fff; }
    
    .last-updated { color: #888; font-size: 0.9rem; }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .stat-value { font-size: 2rem; font-weight: bold; color: #fff; }
    .stat-label { font-size: 0.85rem; color: #888; margin-top: 5px; }
    .stat-card.unanswered { border: 2px solid #ff6b6b; }
    .stat-card.unanswered .stat-value { color: #ff6b6b; }
    
    .stat-card.negative { border: 2px solid #ffa500; }
    .stat-card.negative .stat-value { color: #ffa500; }
    
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #888;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .filter-btn:hover, .filter-btn.active {
      background: #333;
      color: #fff;
      border-color: #555;
    }
    
    .reviews-list { display: flex; flex-direction: column; gap: 15px; }
    
    .review-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      display: grid;
      gap: 12px;
    }
    
    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .review-user {
      font-weight: 600;
      color: #fff;
    }
    
    .review-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .stars { color: #ffc107; letter-spacing: 2px; }
    .stars.low { color: #ff6b6b; }
    .stars.medium { color: #ffa500; }
    
    .review-date { color: #666; font-size: 0.85rem; }
    .review-lang {
      background: #333;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      color: #888;
    }
    
    .review-version { color: #666; font-size: 0.8rem; }
    
    .review-text {
      color: #ccc;
      line-height: 1.6;
      padding: 15px;
      background: #222;
      border-radius: 8px;
      border-left: 3px solid #444;
    }
    
    .review-text.needs-attention { border-left-color: #ff6b6b; background: #1a1a1a; }
    .review-text.responded { border-left-color: #4caf50; }
    
    .review-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .thumbs-up {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #888;
      font-size: 0.9rem;
    }
    
    .thumbs-up.high { color: #4caf50; }
    
    .review-link {
      color: #4fc3f7;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .review-link:hover { text-decoration: underline; }
    
    .reply-badge {
      background: #4caf50;
      color: #fff;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
    }
    
    .reply-text {
      color: #888;
      font-style: italic;
      padding: 10px;
      background: #222;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 5px;
    }
    
    .no-reviews {
      text-align: center;
      padding: 60px;
      color: #666;
    }
    
    .load-error {
      background: #2a1a1a;
      border: 1px solid #ff6b6b;
      border-radius: 12px;
      padding: 20px;
      color: #ff6b6b;
      text-align: center;
    }
    
    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📱 Google Play Reviews</h1>
      <div class="last-updated" id="lastUpdated">Loading...</div>
    </header>
    
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-value" id="totalReviews">-</div>
        <div class="stat-label">Total Reviews</div>
      </div>
      <div class="stat-card unanswered">
        <div class="stat-value" id="unansweredCount">-</div>
        <div class="stat-label">Unanswered</div>
      </div>
      <div class="stat-card negative">
        <div class="stat-value" id="negativeCount">-</div>
        <div class="stat-label">1-2 Stars</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avgScore">-</div>
        <div class="stat-label">Avg Score</div>
      </div>
    </div>
    
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="unanswered">Unanswered</button>
      <button class="filter-btn" data-filter="negative">1-2 Stars</button>
      <button class="filter-btn" data-filter="positive">4-5 Stars</button>
      <button class="filter-btn" data-filter="high-impact">High Impact</button>
    </div>
    
    <div class="reviews-list" id="reviewsList"></div>
  </div>
  
  <script>
    let allReviews = [];
    let currentFilter = 'all';
    
    async function loadReviews() {
      try {
        const response = await fetch('reviews.json');
        const data = await response.json();
        allReviews = data.reviews;
        
        document.getElementById('lastUpdated').textContent = 
          'Updated: ' + new Date(data.fetchedAt).toLocaleString();
        
        renderStats();
        renderReviews();
      } catch (e) {
        document.getElementById('reviewsList').innerHTML = 
          `<div class="load-error">
            Could not load reviews.json<br>
            <small>Run: node index.js</small>
          </div>`;
      }
    }
    
    function renderStats() {
      const total = allReviews.length;
      const unanswered = allReviews.filter(r => !r.replyText);
      const negative = allReviews.filter(r => r.score <= 2);
      const avgScore = total > 0 
        ? (allReviews.reduce((sum, r) => sum + r.score, 0) / total).toFixed(1)
        : '-';
      
      document.getElementById('totalReviews').textContent = total;
      document.getElementById('unansweredCount').textContent = unanswered.length;
      document.getElementById('negativeCount').textContent = negative.length;
      document.getElementById('avgScore').textContent = avgScore;
    }
    
    function getFilteredReviews() {
      switch (currentFilter) {
        case 'unanswered':
          return allReviews.filter(r => !r.replyText);
        case 'negative':
          return allReviews.filter(r => r.score <= 2);
        case 'positive':
          return allReviews.filter(r => r.score >= 4);
        case 'high-impact':
          return allReviews.filter(r => r.thumbsUp >= 2 || (r.score <= 2 && !r.replyText));
        default:
          return allReviews;
      }
    }
    
    function renderReviews() {
      const filtered = getFilteredReviews();
      const container = document.getElementById('reviewsList');
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-reviews">No reviews match this filter</div>';
        return;
      }
      
      container.innerHTML = filtered.map(review => {
        const stars = '★'.repeat(review.score) + '☆'.repeat(5 - review.score);
        const starsClass = review.score <= 2 ? 'low' : review.score === 3 ? 'medium' : '';
        const needsAttention = !review.replyText;
        const textClass = needsAttention ? 'needs-attention' : 'responded';
        const thumbsClass = review.thumbsUp >= 2 ? 'high' : '';
        
        const langNames = {
          en: '🇺🇸', de: '🇩🇪', fr: '🇫🇷', es: '🇪🇸', it: '🇮🇹',
          ja: '🇯🇵', ko: '🇰🇷', zh: '🇨🇳', pt: '🇧🇷', ru: '🇷🇺'
        };
        
        return `
          <div class="review-card">
            <div class="review-header">
              <span class="review-user">${review.userName}</span>
              <div class="review-meta">
                <span class="stars ${starsClass}">${stars}</span>
                <span class="review-date">${new Date(review.date).toLocaleDateString()}</span>
                <span class="review-lang">${langNames[review.lang] || review.lang}</span>
                ${review.version ? `<span class="review-version">v${review.version}</span>` : ''}
              </div>
            </div>
            <div class="review-text ${textClass}">${review.text}</div>
            ${review.replyText ? `
              <div class="reply-text">↳ Dev: ${review.replyText}</div>
            ` : ''}
            <div class="review-footer">
              <span class="thumbs-up ${thumbsClass}">
                👍 ${review.thumbsUp}
              </span>
              <div>
                ${!review.replyText ? '<span class="reply-badge">Needs Reply</span>' : ''}
                <a href="${review.url}" target="_blank" class="review-link">View on Play Store →</a>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderReviews();
      });
    });
    
    loadReviews();
  </script>
</body>
</html>
